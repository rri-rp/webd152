<main>

<h2>Reservations at Pacific Trails</h2>

<p>Required fields are marked with an asterisk *</p>

<form method="post" action="https://webdevbasics.net/scripts/pacific.php" autocomplete="on">

<label for="fname">* First Name:</label>
<input type="text" id="fname" name="fname" required>

<label for="lname">* Last Name:</label>
<input type="text" id="lname" name="lname" required>

<label for="email">* Email:</label>
<input type="email" id="email" name="email" required>

<label for="phone">Phone:</label>
<input type="tel" id="phone" name="phone">

<label for="arrival">Arrival Date:</label>
<input type="date" id="arrival" name="arrival">

<label for="nights">Number of Nights:</label>
<input type="number" id="nights" name="nights" min="1" max="14" required>
<label for="comments">* Comments:</label>
<textarea id="comments" name="comments" rows="4" cols="30" required></textarea>

<input type="submit" value="Submit Reservation">

</form>

</main>
